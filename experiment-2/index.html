<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore - Experiment 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">TechStore</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container product-section py-5">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <div class="img-container">
                        <img src="./laptop-image.avif" class="card-img-top" alt="Laptop">
                    </div>
                    <div class="card-body">
                        <h5 class="card-title">Laptop</h5>
                        <p class="card-text text-muted small">High performance laptop</p>
                        <div class="d-flex align-items-center gap-2 mb-3">
                            <span class="price">₹50,000</span>
                            <span class="badge rounded-pill bg-success">New</span>
                        </div>
                        <button class="btn btn-primary w-100 view-details-btn" data-product="Laptop">View Details</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <div class="img-container">
                        <img src="./mobile-image.jpg" class="card-img-top" alt="Mobile">
                    </div>
                    <div class="card-body">
                        <h5 class="card-title">Mobile</h5>
                        <p class="card-text text-muted small">Latest smartphone</p>
                        <div class="d-flex align-items-center gap-2 mb-3">
                            <span class="price">₹30,000</span>
                            <span class="badge rounded-pill bg-danger">Sale</span>
                        </div>
                        <button class="btn btn-primary w-100 view-details-btn" data-product="Mobile">View Details</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <div class="img-container">
                        <img src="./headphone.jpg" class="card-img-top" alt="Headphones">
                    </div>
                    <div class="card-body">
                        <h5 class="card-title">Headphones</h5>
                        <p class="card-text text-muted small">Noise cancelling</p>
                        <div class="d-flex align-items-center gap-2 mb-3">
                            <span class="price">₹5,000</span>
                            <span class="badge rounded-pill bg-success">New</span>
                        </div>
                        <button class="btn btn-primary w-100 view-details-btn" data-product="Headphones">View Details</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Product Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modalBody">
                    </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer mt-auto py-3 bg-dark text-white text-center">
        <div class="container">
            <span>© 2026 TechStore | Follow us on social media</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
